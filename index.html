<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>How Well Do You Know Chani? 🏎️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQUobxU6EgqIF2F0YZo3GZoLiycsWb6To",
  authDomain: "do-you-know-chani.firebaseapp.com",
  databaseURL: "https://do-you-know-chani-default-rtdb.firebaseio.com",
  projectId: "do-you-know-chani",
  storageBucket: "do-you-know-chani.firebasestorage.app",
  messagingSenderId: "665461915065",
  appId: "1:665461915065:web:7b2c061282de207be7ca68"
};

    try {
      const app = initializeApp(firebaseConfig);
      const db  = getDatabase(app);
      window._fb = { ref, set, onValue, update, get, db };

      window._fbError = e.message;

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Oswald',sans-serif;background:#f5ead6;}
    input,textarea,button{font-family:inherit;}
    @keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    @keyframes spin{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
    @keyframes popIn{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
    @keyframes vroom{0%{transform:translateY(-50%) translateX(-3px) rotate(-1deg)}50%{transform:translateY(-50%) translateX(3px) rotate(1deg)}100%{transform:translateY(-50%) translateX(-3px) rotate(-1deg)}}
    @keyframes exhaust{0%{opacity:.7;transform:scaleX(1) translateX(0)}100%{opacity:0;transform:scaleX(2.5) translateX(-8px)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const CREAM="#f5ead6",CREAM2="#ede0c4",DARK="#1a0a0a",RED="#8b1a1a",
      CARD="#fff8f0",BORDER="#c8a97e",GOLD="#c9a84c",MUTED="#7a5c3a";
const PF={fontFamily:"'Playfair Display',Georgia,serif"};
const OW={fontFamily:"'Oswald',sans-serif"};
const btn=(x={})=>({border:"none",cursor:"pointer",fontFamily:"'Oswald',sans-serif",letterSpacing:2,textTransform:"uppercase",borderRadius:3,transition:"all .2s",...x});

const PLAYERS=["Carla","Jessica","Kelli","Mariana","Rosie","Rubi"];
const DEFAULT_COLORS=["#e63946","#1d6fa4","#f4a811","#2d9e4f","#9b59b6","#1abc9c"];
const CAR_COLORS=[
  {name:"Red",    hex:"#e63946"},
  {name:"Blue",   hex:"#1d6fa4"},
  {name:"Yellow", hex:"#f4a811"},
  {name:"Green",  hex:"#2d9e4f"},
  {name:"Purple", hex:"#9b59b6"},
  {name:"Teal",   hex:"#1abc9c"},
  {name:"Orange", hex:"#e67e22"},
  {name:"Pink",   hex:"#e91e8c"},
];

/* Race track total distance */
const TRACK_LEN=60;

/* Points per question */
const Q_POINTS=[3,2,4,5,3,2,4,3,5,4,3,5,4,3,5];

const QUESTIONS=[
  {id:1,  type:"mc", text:"What is Chani's go-to comfort food when she's had a rough day?",
    opts:["Soup","Tacos","Pizza","Sushi"], answer:"Soup"},
  {id:2,  type:"mc", text:"Which city has been Chani's favorite travel destination so far?",
    opts:["Paris","Budapest","Tokyo","Rome"], answer:"Budapest"},
  {id:3,  type:"mc", text:"What would Chani most likely order at a fancy restaurant?",
    opts:["Wine & charcuterie","Cocktail & steak","Restaurant specialty","Beer & burger"], answer:"Restaurant specialty"},
  {id:4,  type:"mc", text:"How did Chani and her fiancé first meet?",
    opts:["Through mutual friends","At work","On a dating app","At a party"], answer:"Through mutual friends"},
  {id:5,  type:"mc", text:"What is Chani's love language?",
    opts:["Words of affirmation","Acts of service","Quality time","Gift giving"], answer:"Words of affirmation"},
  {id:6,  type:"mc", text:"What does Chani cook most often at home?",
    opts:["Italian","Mexican","Asian fusion","Chani doesn't cook"], answer:"Chani doesn't cook"},
  {id:7,  type:"mc", text:"Where is Chani's dream honeymoon destination?",
    opts:["Maldives","Santorini, Greece","Australia","Bali, Indonesia"], answer:"Australia"},
  {id:8,  type:"mc", text:"What is Chani's biggest travel pet peeve?",
    opts:["Flight delays","Itinerary change","Bad hotel Wi-Fi","No good food options"], answer:"Itinerary change"},
  {id:9,  type:"mc", text:"What is the name of Chani's fiancé?",
    opts:["Tyler","Carlos","Alex","Miguel"], answer:"Tyler"},
  {id:10, type:"mc", text:"What is Chani's signature dish?",
    opts:["Chicken and mushroom pasta","Tacos al pastor","Beef stew","Shrimp stir-fry"], answer:"Chicken and mushroom pasta"},
  {id:11, type:"mc", text:"How many countries has Chani visited?",
    opts:["12","15","20","25"], answer:"20"},
  {id:12, type:"mc", text:"What was the first trip Chani and her fiancé took together?",
    opts:["Fredericksburg","New Orleans","Miami","San Antonio"], answer:"Fredericksburg"},
  {id:13, type:"mc", text:"What is Chani's all-time favorite restaurant?",
    opts:["Mazens","Nobu","Carbone","Uchi"], answer:"Mazens"},
  {id:14, type:"mc", text:"Chani can't travel without her ______.",
    opts:["Backpack full of pockets","Silk eye mask","Noise-cancelling headphones","Neck pillow"], answer:"Backpack full of pockets"},
  {id:15, type:"mc", text:"What food does Chani absolutely refuse to eat?",
    opts:["Cilantro","Mushrooms","Blue cheese","Olives"], answer:"Cilantro"},
];

function checkAns(q,ans){
  if(!q||!q.answer)return false;
  return (ans||"").toLowerCase().trim()===q.answer.toLowerCase().trim();
}
function initScores(){
  const o={};
  PLAYERS.forEach((p,i)=>{o[p]={score:0,pos:0,color:DEFAULT_COLORS[i]};});
  return o;
}
function getPoints(qIdx){return Q_POINTS[qIdx]||2;}

/* ── CAR SVG ── */
function CarSVG({color,size=48,moving=false}){
  const w=size,h=Math.round(size*0.55);
  return(
    <svg width={w} height={h} viewBox="0 0 96 52" style={{display:"block",overflow:"visible"}}>
      {moving&&<ellipse cx={7} cy={38} rx={8} ry={4} fill="rgba(180,180,180,0.55)" style={{animation:"exhaust 0.35s ease-out infinite"}}/>}
      <rect x={8} y={20} width={80} height={22} rx={6} fill={color}/>
      <path d="M24 20 Q28 8 42 8 L62 8 Q74 8 76 20Z" fill={color}/>
      <path d="M26 20 Q30 10 42 10 L62 10 Q72 10 74 20Z" fill="rgba(0,0,0,0.13)"/>
      <path d="M30 19 Q34 10 43 10 L56 10 Q63 10 66 19Z" fill="rgba(180,220,255,0.88)"/>
      <rect x={67} y={11} width={7} height={8} rx={2} fill="rgba(180,220,255,0.88)"/>
      <ellipse cx={87} cy={28} rx={4} ry={3} fill="#fffbe6" opacity={0.9}/>
      <ellipse cx={87} cy={28} rx={2} ry={1.5} fill="#fff"/>
      <ellipse cx={10} cy={28} rx={3} ry={2.5} fill="#ff4040" opacity={0.85}/>
      <rect x={8} y={29} width={80} height={3} rx={1} fill="rgba(255,255,255,0.2)"/>
      <circle cx={24} cy={42} r={9} fill="#222"/>
      <circle cx={24} cy={42} r={5} fill="#aaa"/>
      <circle cx={24} cy={42} r={2.5} fill="#222"/>
      <circle cx={70} cy={42} r={9} fill="#222"/>
      <circle cx={70} cy={42} r={5} fill="#aaa"/>
      <circle cx={70} cy={42} r={2.5} fill="#222"/>
      <path d="M15 36 Q24 30 33 36" fill="none" stroke={color} strokeWidth={4}/>
      <path d="M61 36 Q70 30 79 36" fill="none" stroke={color} strokeWidth={4}/>
    </svg>
  );
}

/* ── RACE TRACK ── */
function RaceTrack({scores,animating,large=false}){
  const containerRef=useRef(null);
  const [cw,setCw]=useState(700);
  useEffect(()=>{
    if(!containerRef.current)return;
    const ro=new ResizeObserver(e=>setCw(Math.round(e[0].contentRect.width)));
    ro.observe(containerRef.current);
    return()=>ro.disconnect();
  },[]);

  const laneH=large?90:66;
  const carW=large?72:54;
  const carH=Math.round(carW*0.55);
  const labelW=large?100:80;
  const flagW=large?42:32;
  const roadW=cw-labelW-flagW-8;

  function posToLeft(pos){
    const p=Math.max(0,Math.min(TRACK_LEN,pos||0));
    return labelW+(p/TRACK_LEN)*roadW - carW*0.5;
  }

  const leader=PLAYERS.reduce((a,b)=>(scores[b]?.pos||0)>(scores[a]?.pos||0)?b:a,PLAYERS[0]);

  return(
    <div ref={containerRef} style={{background:CREAM,border:`3px solid ${RED}`,borderRadius:12,overflow:"hidden",boxShadow:"0 4px 24px rgba(139,26,26,.14)"}}>
      <div style={{background:RED,textAlign:"center",padding:large?"8px":"5px 8px"}}>
        <span style={{...PF,fontSize:large?"1.1rem":"0.82rem",fontWeight:900,color:"#fff",letterSpacing:3}}>♥ HOW WELL DO YOU KNOW CHANI? ♥</span>
      </div>
      {PLAYERS.map((name,li)=>{
        const sc=scores[name]||{score:0,pos:0,color:DEFAULT_COLORS[li]};
        const isMoving=!!(animating&&animating[name]);
        const isLeading=name===leader&&(sc.pos||0)>0;
        const carLeft=posToLeft(sc.pos||0);
        const progress=Math.min(100,Math.round(((sc.pos||0)/TRACK_LEN)*100));
        return(
          <div key={name} style={{
            display:"flex",alignItems:"center",
            height:laneH,
            borderBottom:li<PLAYERS.length-1?`1px solid ${BORDER}`:undefined,
            background:li%2===0?CREAM:"#f0e4c8",
            position:"relative",overflow:"hidden"
          }}>
            {/* Name + score label */}
            <div style={{width:labelW,flexShrink:0,paddingLeft:8,paddingRight:4,zIndex:4}}>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                {isLeading&&<span style={{fontSize:large?"0.9rem":"0.7rem"}}>👑</span>}
                <span style={{...OW,fontSize:large?"0.82rem":"0.65rem",fontWeight:700,color:DARK,textTransform:"uppercase",letterSpacing:0.5,lineHeight:1}}>{name}</span>
              </div>
              <div style={{...OW,fontSize:large?"0.75rem":"0.58rem",color:RED,fontWeight:700}}>{sc.score||0} pts</div>
              <div style={{marginTop:2,height:3,borderRadius:2,background:`rgba(0,0,0,.08)`,width:"80%"}}>
                <div style={{height:"100%",borderRadius:2,background:sc.color,width:`${progress}%`,transition:"width .8s ease"}}/>
              </div>
            </div>

            {/* Road */}
            <div style={{position:"absolute",left:labelW,right:flagW+6,top:"50%",transform:"translateY(-50%)",height:laneH*0.55,background:"#2a2a2a",borderRadius:4,zIndex:1}}>
              {/* Road centre dashes */}
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:"2px",transform:"translateY(-50%)",background:"repeating-linear-gradient(90deg,rgba(255,255,255,0.55) 0,rgba(255,255,255,0.55) 16px,transparent 16px,transparent 32px)"}}/>
              {/* Progress highlight */}
              <div style={{position:"absolute",top:0,left:0,bottom:0,width:`${progress}%`,background:`linear-gradient(90deg,${sc.color}55,${sc.color}22)`,borderRadius:4,transition:"width .8s ease",pointerEvents:"none"}}/>
            </div>

            {/* Finish flag */}
            <div style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:large?"1.6rem":"1.15rem",zIndex:4}}>🏁</div>

            {/* Car */}
            <div style={{
              position:"absolute",
              left:carLeft,
              top:"50%",
              transform:"translateY(-50%)",
              zIndex:5,
              transition:"left 0.85s cubic-bezier(.4,0,.2,1)",
              animation:isMoving?"vroom 0.28s ease infinite":undefined,
              willChange:"left",
            }}>
              <CarSVG color={sc.color||DEFAULT_COLORS[li]} size={carW} moving={isMoving}/>
              {/* Initial badge above car */}
              <div style={{
                position:"absolute",
                top:-large?11:-8,
                left:"50%",
                transform:"translateX(-50%)",
                background:sc.color,
                color:"#fff",
                width:large?22:17,
                height:large?22:17,
                borderRadius:"50%",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:large?"0.7rem":"0.55rem",
                fontWeight:700,...OW,
                border:"1.5px solid #fff",
                boxShadow:"0 1px 4px rgba(0,0,0,.45)",
                zIndex:6,
              }}>{name[0]}</div>
            </div>
          </div>
        );
      })}
      {/* Distance axis */}
      <div style={{display:"flex",background:CREAM2,paddingLeft:labelW,paddingRight:flagW+6,paddingTop:3,paddingBottom:3,borderTop:`1px solid ${BORDER}`}}>
        {["START","25%","50%","75%","FINISH"].map((lbl,i)=>(
          <div key={i} style={{flex:i===0?0:1,textAlign:i===0?"left":"right",...OW,fontSize:"0.52rem",color:MUTED,letterSpacing:1}}>{lbl}</div>
        ))}
      </div>
    </div>
  );
}

/* ── QR BOX ── */
function QRBox(){
  const playerUrl=window.location.origin+window.location.pathname+"?view=player";
  const divRef=useRef(null),objRef=useRef(null);
  useEffect(()=>{
    if(divRef.current&&!objRef.current)
      objRef.current=new QRCode(divRef.current,{text:playerUrl,width:100,height:100,colorDark:DARK,colorLight:CREAM,correctLevel:QRCode.CorrectLevel.M});
  },[]);
  return(
    <div style={{background:CREAM,border:`2px solid ${BORDER}`,borderRadius:8,padding:8,textAlign:"center"}}>
      <div style={{fontSize:"0.52rem",letterSpacing:2,color:RED,...OW,marginBottom:4}}>PLAYERS SCAN TO JOIN</div>
      <div ref={divRef} style={{display:"inline-block",padding:3,background:CREAM}}/>
      <div style={{fontSize:"0.46rem",color:MUTED,marginTop:3,...OW,wordBreak:"break-all"}}>{playerUrl}</div>
    </div>
  );
}

/* ── REVEAL POPUP ── */
function RevealPopup({q,pts,onContinue}){
  if(!q)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:9998,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:CREAM,border:`4px solid ${RED}`,borderRadius:20,padding:"32px 36px",maxWidth:520,width:"100%",textAlign:"center",animation:"popIn .4s ease",boxShadow:"0 24px 80px rgba(0,0,0,.6)"}}>
        <div style={{...OW,fontSize:"0.7rem",letterSpacing:4,color:RED,marginBottom:10}}>✓ CORRECT ANSWER</div>
        <div style={{...PF,fontSize:"2rem",fontWeight:900,color:RED,lineHeight:1.15,marginBottom:12}}>{q.answer||"(not set)"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:16,textAlign:"left"}}>
          {(q.opts||[]).map((opt,i)=>{
            const correct=opt.toLowerCase()===(q.answer||"").toLowerCase();
            return(
              <div key={i} style={{background:correct?"rgba(45,106,45,.12)":"rgba(139,26,26,.05)",border:`1.5px solid ${correct?"#2d6a2d":BORDER}`,borderRadius:6,padding:"8px 12px",fontSize:"0.85rem",color:correct?"#2d6a2d":DARK,fontWeight:correct?700:400}}>
                <span style={{...OW,fontWeight:700,color:correct?"#2d6a2d":RED,marginRight:6}}>{["A","B","C","D"][i]})</span>{opt}{correct&&" ✓"}
              </div>
            );
          })}
        </div>
        <div style={{...OW,fontSize:"0.7rem",background:RED,color:"#fff",borderRadius:20,padding:"3px 14px",display:"inline-block",marginBottom:20}}>+{pts} pts correct · -{Math.ceil(pts/2)} pts wrong</div>
        <br/>
        <button onClick={onContinue} style={btn({background:RED,color:"#fff",padding:"14px 40px",fontSize:"1rem",fontWeight:700,letterSpacing:3,boxShadow:"0 4px 16px rgba(139,26,26,.35)"})}>
          CONTINUE → (MOVE CARS)
        </button>
      </div>
    </div>
  );
}

/* ── SPLASH / FIREBASE ── */
function Splash({msg}){return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:DARK,color:GOLD,...PF,fontSize:"1.2rem",textAlign:"center",padding:20}}>{msg}</div>;}
function FirebaseSetup(){
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:DARK,padding:24}}>
      <div style={{maxWidth:560,width:"100%",border:`2px solid ${GOLD}`,borderRadius:16,padding:28,color:CREAM,...PF}}>
        <div style={{fontSize:"1.3rem",color:GOLD,...OW,letterSpacing:2,marginBottom:8}}>Firebase Setup Required</div>
        <p style={{opacity:.8,fontSize:"0.9rem",lineHeight:1.6}}>Paste your Firebase config in the source file to enable real-time sync.</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   ROOT APP
═══════════════════════════════ */
function App(){
  const isPlayer=new URLSearchParams(window.location.search).get("view")==="player";
  const isTV=new URLSearchParams(window.location.search).get("view")==="tv";

  const [fbReady,setFbReady]=useState(!!window._fb);
  const [fbBroken,setFbBroken]=useState(false);
  const [view,setView]=useState(isPlayer?"player":isTV?"tv":"landing");
  const [gameState,setGameState]=useState(null);
  const [myName,setMyName]=useState(null);
  const [myMC,setMyMC]=useState(null);
  const [mySubmitted,setMySubmitted]=useState(false);
  const [myResult,setMyResult]=useState(null);
  const [mySeenQ,setMySeenQ]=useState(-1);
  const [animating,setAnimating]=useState({});
  const [setupQs,setSetupQs]=useState(null);
  const prevPosRef=useRef({});
  const timerRef=useRef(null);

  useEffect(()=>{
    if(fbReady)return;
    const h=()=>{if(window._fbError||!window._fb)setFbBroken(true);else setFbReady(true);};
    window.addEventListener("firebase-ready",h);
    return()=>window.removeEventListener("firebase-ready",h);
  },[fbReady]);

  useEffect(()=>{
    if(!fbReady)return;
    try{window._fb.get(window._fb.ref(window._fb.db,"game")).catch(()=>setFbBroken(true));}
    catch(e){setFbBroken(true);}
  },[fbReady]);

  useEffect(()=>{
    if(!fbReady||fbBroken)return;
    const unsub=window._fb.onValue(window._fb.ref(window._fb.db,"game"),snap=>setGameState(snap.val()||null));
    return()=>unsub();
  },[fbReady,fbBroken]);

  /* Detect position changes for car animation */
  useEffect(()=>{
    if(!gameState?.scores)return;
    const newAnim={};
    PLAYERS.forEach(name=>{
      const newPos=gameState.scores[name]?.pos||0;
      const oldPos=prevPosRef.current[name];
      if(oldPos!==undefined&&oldPos!==newPos)newAnim[name]=true;
    });
    if(Object.keys(newAnim).length>0){
      setAnimating(newAnim);
      setTimeout(()=>setAnimating({}),950);
    }
    PLAYERS.forEach(name=>{prevPosRef.current[name]=gameState.scores[name]?.pos||0;});
  },[gameState?.scores]);

  useEffect(()=>{if(isPlayer&&gameState?.phase==="winner")setView("winner-player");},[gameState?.phase]);

  useEffect(()=>{
    if(!myName||!gameState)return;
    const cq=gameState.curQ;
    if(cq>0&&cq!==mySeenQ){setMySeenQ(cq);setMySubmitted(false);setMyResult(null);setMyMC(null);}
  },[gameState?.curQ,myName]);

  useEffect(()=>{
    if(!fbReady||fbBroken||isPlayer||isTV)return;
    if(!gameState?.timerOn)return;
    clearInterval(timerRef.current);
    timerRef.current=setInterval(async()=>{
      const snap=await window._fb.get(window._fb.ref(window._fb.db,"game/timer"));
      const t=snap.val()??0;
      if(t<=1){clearInterval(timerRef.current);fbUpd("game",{timer:0,timerOn:false,phase:"reveal"});}
      else{fbUpd("game",{timer:t-1});}
    },1000);
    return()=>clearInterval(timerRef.current);
  },[gameState?.timerOn,fbReady,fbBroken,isPlayer,isTV]);

  if(!fbReady&&!fbBroken)return <Splash msg="🏎️ Connecting…"/>;
  if(fbBroken||window._fbError)return <FirebaseSetup/>;

  function fbSet(p,v){window._fb.set(window._fb.ref(window._fb.db,p),v);}
  function fbUpd(p,v){window._fb.update(window._fb.ref(window._fb.db,p),v);}

  function hostInit(){
    fbSet("game",{phase:"lobby",curQ:0,timer:25,timerOn:false,revealed:false,scores:initScores(),submissions:{},finishOrder:[],tvPopup:null});
  }
  function doNextQ(){
    const next=(gameState?.curQ||0)+1;
    if(next>QUESTIONS.length){fbUpd("game",{phase:"winner",timerOn:false});return;}
    fbUpd("game",{curQ:next,timer:25,timerOn:true,revealed:false,submissions:{},phase:"question",tvPopup:null});
  }
  function hostReveal(){
    clearInterval(timerRef.current);
    const gs=gameState;
    const qIdx=gs.curQ-1;
    const QS=window._editedQuestions||QUESTIONS;
    const q=QS[qIdx];
    const subs=gs.submissions||{};
    const scores=JSON.parse(JSON.stringify(gs.scores||initScores()));
    const pts=getPoints(qIdx);
    const finishOrder=[...(gs.finishOrder||[])];
    Object.entries(subs).forEach(([name,ans])=>{
      if(!scores[name])return;
      const ok=checkAns(q,ans);
      const d=ok?pts:-Math.ceil(pts/2);
      const newPos=Math.max(0,Math.min(TRACK_LEN,(scores[name].pos||0)+d));
      scores[name]={...scores[name],score:(scores[name].score||0)+d,pos:newPos};
      if(newPos>=TRACK_LEN&&!finishOrder.includes(name))finishOrder.push(name);
    });
    fbUpd("game",{timerOn:false,revealed:true,phase:"reveal"});
    fbUpd("game",{tvPopup:{type:"reveal",qText:q.text,qType:q.type,qOpts:q.opts||[],qAnswer:q.answer||"",pts,pendingScores:scores,pendingFinishOrder:finishOrder}});
  }
  function handleRevealContinue(){
    const pending=gs?.tvPopup?.pendingScores;
    const pendingFO=gs?.tvPopup?.pendingFinishOrder;
    const upd={tvPopup:null};
    if(pending)upd.scores=pending;
    if(pendingFO)upd.finishOrder=pendingFO;
    fbUpd("game",upd);
  }
  function hostReset(){
    clearInterval(timerRef.current);
    fbSet("game",{phase:"lobby",curQ:0,timer:25,timerOn:false,revealed:false,scores:initScores(),submissions:{},finishOrder:[],tvPopup:null});
  }
  function playerSubmit(ans){
    fbUpd("game/submissions",{[myName]:ans});
    const QS=window._editedQuestions||QUESTIONS;
    const ok=checkAns(QS[(gameState?.curQ||1)-1],ans);
    setMyResult(ok?"correct":"wrong");
    setMySubmitted(true);
  }
  function playerSetColor(name,hex){
    fbUpd("game/scores/"+name,{color:hex});
  }

  const gs=gameState;
  const _QS=window._editedQuestions||QUESTIONS;
  const q=gs&&gs.curQ>0?_QS[gs.curQ-1]:null;
  const scores=gs?.scores||initScores();
  const subs=gs?.submissions||{};
  const timer=gs?.timer??25;
  const revealed=gs?.revealed||false;
  const phase=gs?.phase||"lobby";
  const sorted=[...PLAYERS].sort((a,b)=>(scores[b]?.score||0)-(scores[a]?.score||0));
  const sortedByPos=[...PLAYERS].sort((a,b)=>(scores[b]?.pos||0)-(scores[a]?.pos||0));
  const finishOrder=gs?.finishOrder||[];
  const qIdx=gs&&gs.curQ>0?gs.curQ-1:0;
  const pts=getPoints(qIdx);
  const tvPopup=gs?.tvPopup||null;
  const totalTime=25;
  const pct=(timer/totalTime)*100;
  const answered=Object.keys(subs||{}).length;

  if(view==="landing")return <Landing
    onHost={()=>{if(!gs)hostInit();setView("host");}}
    onSetup={()=>{setSetupQs(QUESTIONS.map(q=>({...q,opts:[...q.opts]})));setView("setup");}}
    onPlayer={()=>setView("player")}
    onTV={()=>setView("tv")}
  />;

  if(view==="setup")return <Setup qs={setupQs} setQs={setSetupQs}
    save={(saved)=>{
      // Persist edited questions into local state so game uses them
      // Since we always use QUESTIONS const, we override it via a ref trick:
      // Store in window so hostReveal can pick it up
      window._editedQuestions=saved;
      setView("landing");
    }}
    back={()=>setView("landing")}
  />;

  if(view==="host"){
    if(phase==="winner")return <WinnerScreen sorted={sorted} sortedByPos={sortedByPos} scores={scores} finishOrder={finishOrder} reset={hostReset}/>;
    return <Host gs={gs} q={q} timer={timer} pct={pct} subs={subs} revealed={revealed}
      scores={scores} sorted={sorted} pts={pts} tvPopup={tvPopup} answered={answered}
      nextQ={doNextQ} reveal={hostReveal} reset={hostReset}
      onRevealContinue={handleRevealContinue} animating={animating}/>;
  }

  if(view==="player")return <PlayerView gs={gs} myName={myName} setMyName={setMyName}
    myMC={myMC} setMyMC={setMyMC} submitted={mySubmitted} result={myResult}
    submit={playerSubmit} q={q} timer={timer} pct={pct} subs={subs} pts={pts}
    scores={scores} setColor={playerSetColor} back={()=>setView("landing")}/>;

  if(view==="winner-player")return <WinnerScreen sorted={sorted} sortedByPos={sortedByPos} scores={scores} finishOrder={finishOrder} isPlayer/>;

  if(view==="tv")return <TVDisplay gs={gs} phase={phase} scores={scores} q={q} timer={timer}
    pct={pct} revealed={revealed} pts={pts} subs={subs} answered={answered}
    tvPopup={tvPopup} finishOrder={finishOrder} animating={animating}
    sorted={sorted} sortedByPos={sortedByPos} onRevealContinue={handleRevealContinue}/>;

  return null;
}

/* ═══════════════════════════════
   SETUP — edit questions & answers
═══════════════════════════════ */
function Setup({qs,setQs,save,back}){
  if(!qs)return null;
  const inp={width:"100%",background:CREAM,border:`1.5px solid ${BORDER}`,borderRadius:4,padding:"7px 10px",color:DARK,fontSize:"0.88rem",outline:"none",boxSizing:"border-box",...OW};
  return(
    <div style={{background:CREAM2,minHeight:"100vh",color:DARK}}>
      <div style={{background:RED,textAlign:"center",padding:"14px 20px",borderBottom:`3px solid ${BORDER}`}}>
        <div style={{...PF,fontSize:"1.5rem",fontWeight:700,color:"#fff"}}>Edit Questions & Answers</div>
        <div style={{...PF,fontStyle:"italic",fontSize:"0.9rem",color:"rgba(255,255,255,.8)"}}>Change MC options and correct answers before the game starts</div>
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:16}}>
        {qs.map((q,qi)=>(
          <div key={q.id} style={{background:CARD,border:`1.5px solid ${BORDER}`,borderRadius:10,padding:"14px 16px",marginBottom:12,boxShadow:"0 2px 6px rgba(0,0,0,.05)"}}>
            {/* Question header */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{...OW,fontSize:"0.62rem",letterSpacing:2,color:RED,textTransform:"uppercase"}}>Question {q.id}</span>
              <span style={{...OW,fontSize:"0.62rem",background:RED,color:"#fff",borderRadius:20,padding:"1px 8px"}}>{Q_POINTS[qi]||2} pts</span>
            </div>
            {/* Question text */}
            <div style={{marginBottom:10}}>
              <div style={{...OW,fontSize:"0.6rem",color:MUTED,letterSpacing:1,marginBottom:4}}>QUESTION TEXT</div>
              <input style={inp} value={q.text} onChange={e=>{setQs(prev=>{const n=[...prev];n[qi]={...n[qi],text:e.target.value};return n;});}} placeholder="Question text"/>
            </div>
            {/* Options A-D */}
            <div style={{...OW,fontSize:"0.6rem",color:MUTED,letterSpacing:1,marginBottom:6}}>ANSWER OPTIONS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
              {["A","B","C","D"].map((l,oi)=>{
                const isCorrect=q.opts[oi]===q.answer;
                return(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{...OW,fontSize:"0.72rem",color:isCorrect?"#2d6a2d":RED,fontWeight:700,minWidth:18}}>{l})</span>
                    <input
                      style={{...inp,border:`1.5px solid ${isCorrect?"#2d6a2d":BORDER}`,flex:1,background:isCorrect?"rgba(45,106,45,.06)":CREAM}}
                      value={q.opts[oi]||""}
                      onChange={e=>{
                        setQs(prev=>{
                          const n=[...prev];
                          const wasAnswer=n[qi].opts[oi]===n[qi].answer;
                          const newOpts=[...n[qi].opts];
                          newOpts[oi]=e.target.value;
                          n[qi]={...n[qi],opts:newOpts};
                          // if this was the correct answer, update answer to match new text
                          if(wasAnswer)n[qi]={...n[qi],answer:e.target.value};
                          return n;
                        });
                      }}
                      placeholder={`Option ${l}`}
                    />
                  </div>
                );
              })}
            </div>
            {/* Correct answer selector */}
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{...OW,fontSize:"0.62rem",color:MUTED,letterSpacing:1,whiteSpace:"nowrap"}}>CORRECT ANSWER:</span>
              {q.opts.map((opt,oi)=>(
                <div key={oi} onClick={()=>{setQs(prev=>{const n=[...prev];n[qi]={...n[qi],answer:opt};return n;});}}
                  style={{cursor:"pointer",background:q.answer===opt?"rgba(45,106,45,.12)":CREAM2,border:`1.5px solid ${q.answer===opt?"#2d6a2d":BORDER}`,borderRadius:20,padding:"4px 12px",fontSize:"0.72rem",color:q.answer===opt?"#2d6a2d":DARK,fontWeight:q.answer===opt?700:400,...OW,transition:"all .15s"}}>
                  {q.answer===opt?"✓ ":""}{["A","B","C","D"][oi]}) {opt}
                </div>
              ))}
            </div>
          </div>
        ))}
        <div style={{display:"flex",gap:10,justifyContent:"center",padding:"16px 0",flexWrap:"wrap"}}>
          <button style={btn({background:RED,color:"#fff",padding:"13px 32px",fontSize:"0.9rem",fontWeight:600,letterSpacing:2})} onClick={()=>save(qs)}>💾 SAVE CHANGES</button>
          <button style={btn({background:"transparent",color:MUTED,border:`1.5px solid ${BORDER}`,padding:"10px 20px",fontSize:"0.85rem"})} onClick={back}>← BACK</button>
        </div>
      </div>
    </div>
  );
}

                      <span style={{...OW,fontWeight:700,color:ok?"#2d6a2d":RED,marginRight:3}}>{["A","B","C","D"][i]})</span>{opt}{ok&&" ✓"}

            </div>;
          })}

        </div>
      </div>
    </div>
  );
}

  );

  return(
    <div style={{background:CREAM,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{maxWidth:390,width:"100%",background:CARD,border:`2px solid ${BORDER}`,borderRadius:16,padding:"20px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <span style={{...OW,fontSize:"0.6rem",letterSpacing:3,color:RED}}>Q {gs.curQ} OF {QUESTIONS.length}</span>
          <span style={{...OW,fontSize:"0.65rem",background:RED,color:"#fff",borderRadius:20,padding:"2px 9px"}}>+{pts} pts forward!</span>
        </div>
        <div style={{...PF,fontSize:"1.05rem",color:DARK,lineHeight:1.4,marginBottom:12,fontWeight:700}}>{q.text}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1,height:6,background:"rgba(0,0,0,.08)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:pct<34?`linear-gradient(90deg,${RED},#e74c3c)`:`linear-gradient(90deg,${BORDER},${GOLD})`,borderRadius:4,transition:"width 1s linear"}}/>
          </div>
          <div style={{...PF,fontSize:"1.2rem",color:pct<34?RED:MUTED,minWidth:26,textAlign:"right",fontWeight:700}}>{timer}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
          {["A","B","C","D"].map((l,i)=>(
            <button key={i} onClick={()=>setMyMC(q.opts[i])} style={btn({background:myMC===q.opts[i]?"rgba(139,26,26,.1)":CREAM2,border:`1.5px solid ${myMC===q.opts[i]?RED:BORDER}`,borderRadius:8,padding:"11px 12px",color:myMC===q.opts[i]?RED:DARK,fontSize:"0.88rem",textAlign:"left"})}>
              <span style={{fontWeight:700,color:RED,marginRight:6,...OW}}>{l})</span>{q.opts[i]}
            </button>
          ))}
        </div>
        <button style={btn({background:RED,color:"#fff",padding:"12px",fontSize:"0.9rem",fontWeight:600,width:"100%",opacity:timer===0?.5:1,letterSpacing:2})}
          onClick={()=>{if(!myMC){alert("Pick an answer!");return;}submit(myMC);}} disabled={timer===0}>
          {timer===0?"⏰ TIME'S UP!":"SUBMIT 🏁"}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   TV DISPLAY
═══════════════════════════════ */
function TVDisplay({gs,phase,scores,q,timer,pct,revealed,pts,subs,answered,tvPopup,finishOrder,animating,sorted,sortedByPos,onRevealContinue}){
  if(!gs||phase==="lobby")return(
    <div style={{background:CREAM,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",gap:16}}>
      <div style={{fontSize:"3rem",animation:"pulse 2.5s ease-in-out infinite"}}>🏎️ 🏁 🏎️</div>
      <div style={{...PF,fontSize:"clamp(2rem,5vw,4rem)",fontWeight:900,color:RED,lineHeight:1.05}}>LA ÚLTIMA APUESTA<br/><span style={{fontSize:"0.65em",color:DARK}}>EN LAS VEGAS</span></div>
      <div style={{width:100,height:4,background:RED,margin:"0 auto"}}/>
      <div style={{...OW,fontSize:"1.2rem",letterSpacing:4,color:MUTED}}>CHANI'S BACHELORETTE 2026</div>
    </div>
  );
  if(phase==="winner")return <WinnerScreen sorted={sorted} sortedByPos={sortedByPos} scores={scores} finishOrder={finishOrder} isPlayer/>;

  return(
    <div style={{background:CREAM2,height:"100vh",display:"flex",flexDirection:"column",color:DARK,overflow:"hidden"}}>
      {tvPopup?.type==="reveal"&&(
        <RevealPopup q={{text:tvPopup.qText,type:tvPopup.qType,opts:tvPopup.qOpts,answer:tvPopup.qAnswer}} pts={tvPopup.pts} onContinue={onRevealContinue}/>
      )}
      <div style={{background:RED,textAlign:"center",padding:"10px 24px",borderBottom:`3px solid ${BORDER}`,flexShrink:0}}>
        <div style={{...PF,fontSize:"clamp(1.2rem,2.8vw,2rem)",fontWeight:900,color:"#fff",letterSpacing:4}}>♠ HOW WELL DO YOU KNOW CHANI? ♠</div>
        <div style={{...OW,fontSize:"0.78rem",color:"rgba(255,255,255,.7)",letterSpacing:2}}>LA ÚLTIMA APUESTA EN LAS VEGAS · BACHELORETTE 2026</div>
      </div>
      <div style={{flex:1,padding:16,display:"flex",flexDirection:"column",gap:12,minHeight:0}}>
        <div style={{flex:1,minHeight:0,display:"flex",alignItems:"stretch"}}>
          <div style={{width:"100%"}}><RaceTrack scores={scores} animating={animating} large={true}/></div>
        </div>
        {!revealed&&q&&(
          <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:14,background:CARD,border:`2px solid ${BORDER}`,borderRadius:10,padding:"10px 18px"}}>
            <div style={{...PF,fontSize:"1.3rem",fontWeight:700,color:pct<34?RED:MUTED,minWidth:32}}>{timer}</div>
            <div style={{flex:1,height:10,background:"rgba(0,0,0,.08)",borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:pct<34?`linear-gradient(90deg,${RED},#e74c3c)`:`linear-gradient(90deg,${BORDER},${GOLD})`,transition:"width 1s linear"}}/>
            </div>
            <div style={{...OW,fontSize:"0.78rem",color:MUTED}}>{answered}/{PLAYERS.length} answered</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   WINNER SCREEN
═══════════════════════════════ */
function WinnerScreen({sorted,sortedByPos,scores,finishOrder,reset,isPlayer}){
  const medals=["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"];
  const confetti=Array.from({length:60},(_,i)=>({l:`${Math.random()*100}%`,c:[RED,GOLD,CREAM,DARK,"#fff"][i%5],w:6+Math.random()*8,h:6+Math.random()*8,d:`${2+Math.random()*3}s`,dl:`${Math.random()*2}s`,r:Math.random()>.5}));
  const didntFinish=PLAYERS.filter(p=>!(finishOrder||[]).includes(p)).sort((a,b)=>(scores[b]?.pos||0)-(scores[a]?.pos||0));
  const raceOrder=[...(finishOrder||[]),...didntFinish];

  return(
    <div style={{background:CREAM,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 20px",textAlign:"center",position:"relative",overflow:"hidden"}}>
      {confetti.map((c,i)=><div key={i} style={{position:"absolute",top:-20,left:c.l,width:c.w,height:c.h,background:c.c,borderRadius:c.r?"50%":"2px",animation:`fall ${c.d} ${c.dl} linear infinite`,pointerEvents:"none"}}/>)}
      <div style={{position:"relative",zIndex:1,marginBottom:10}}>
        <div style={{fontSize:"3rem",animation:"bounce 1s ease-in-out infinite"}}>🏁</div>
        <div style={{...PF,fontSize:"clamp(1.4rem,4vw,2.2rem)",color:RED,margin:"8px 0 4px",fontWeight:900}}>🎉 Race Over! 🎉</div>
        <div style={{width:60,height:3,background:RED,margin:"0 auto"}}/>
      </div>
      <div style={{display:"flex",gap:20,width:"100%",maxWidth:740,position:"relative",zIndex:1,flexWrap:"wrap",justifyContent:"center"}}>
        {/* Most points */}
        <div style={{flex:1,minWidth:280}}>
          <div style={{...PF,fontSize:"1.15rem",fontWeight:700,color:RED,marginBottom:4}}>🃏 Most Knowledgeable</div>
          <div style={{...OW,fontSize:"0.6rem",color:MUTED,letterSpacing:2,marginBottom:10}}>RANKED BY CORRECT ANSWERS</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {sorted.map((name,i)=>(
              <div key={name} style={{background:i===0?CARD:CREAM2,border:`2px solid ${i===0?RED:BORDER}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:"1.1rem",minWidth:28}}>{medals[i]}</span>
                <CarSVG color={scores[name]?.color||DEFAULT_COLORS[i]} size={34}/>
                <span style={{flex:1,...OW,fontSize:"0.82rem",letterSpacing:1,textTransform:"uppercase",textAlign:"left"}}>{name}</span>
                <span style={{...PF,fontSize:"1.05rem",color:RED,fontWeight:700}}>{scores[name]?.score||0} pts</span>
              </div>
            ))}
          </div>
        </div>
        {/* Race results */}
        <div style={{flex:1,minWidth:280}}>
          <div style={{...PF,fontSize:"1.15rem",fontWeight:700,color:"#2d6a2d",marginBottom:4}}>🏁 Race Results</div>
          <div style={{...OW,fontSize:"0.6rem",color:MUTED,letterSpacing:2,marginBottom:10}}>RANKED BY DISTANCE DRIVEN</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {raceOrder.map((name,i)=>{
              const reached=(finishOrder||[]).includes(name);
              const pos=scores[name]?.pos||0;
              const pct=Math.min(100,Math.round((pos/TRACK_LEN)*100));
              return(
                <div key={name} style={{background:i===0&&reached?CARD:CREAM2,border:`2px solid ${i===0&&reached?"#2d6a2d":BORDER}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:"1.1rem",minWidth:28}}>{reached?medals[i]:"—"}</span>
                  <CarSVG color={scores[name]?.color||DEFAULT_COLORS[i]} size={34}/>
                  <span style={{flex:1,...OW,fontSize:"0.82rem",letterSpacing:1,textTransform:"uppercase",textAlign:"left"}}>{name}</span>
                  <span style={{...PF,fontSize:"1.05rem",color:reached?"#2d6a2d":MUTED,fontWeight:700}}>
                    {reached?"🏁 Finished":`${pct}%`}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {!isPlayer&&reset&&(
        <button style={btn({background:RED,color:"#fff",padding:"13px 32px",fontSize:"0.9rem",fontWeight:600,marginTop:22,position:"relative",zIndex:1,letterSpacing:2})} onClick={reset}>
          RACE AGAIN 🏎️
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
